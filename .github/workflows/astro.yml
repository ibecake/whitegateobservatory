name: WHITEGATE_OBS_WF
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours at minute 0
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site (astro + weather + fishing)
        env:
          METEOSOURCE_API_KEY: ${{ secrets.METEOSOURCE_API_KEY }}
          WORLD_TIDES_KEY: ${{ secrets.WORLD_TIDES_KEY }}
        run: |
          rm -rf dist
          mkdir -p dist/astro dist/weather dist/fishing
          
          # Build cards (these create card.html files with actual API data)
          # astro_build.py generates: dist/astro/card.html, dist/astro/astro.json
          # AND dist/weather/whitegate.html, dist/weather/cork.html
          python astro_build.py --out dist/astro
          
          # fish_build.py generates: dist/fishing/card.html, dist/fishing/fishing.json
          python fish_build.py --out dist/fishing
          
          # Copy generated card.html to expected iframe locations
          # astro/card.html → astro/astro.html
          cp dist/astro/card.html dist/astro/astro.html
          # fishing/card.html is already correct
          # weather files are generated by astro_build.py
          
          # Copy site shell pages (now only index.html - all forecasts consolidated)
          cp index.html dist/index.html
          cp radio.html dist/radio.html
          cp radio-astronomy.html dist/radio-astronomy.html
          cp astro-photography.html dist/astro-photography.html
          cp tinygs.html dist/tinygs.html
          # combined.html is generated by astro_build.py in dist/ already
          cp -R assets dist/assets
          
          # Debug: List what was created
          echo "=== dist/ structure ==="
          find dist -type f \( -name "*.html" -o -name "*.json" \) | sort
          echo "======================="
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          name: github-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
