<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whitegate Observatory</title>
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      .top-menu {
        background: #1a1a1a;
        padding: 0.85rem 2rem;
        border-bottom: 2px solid #333;
      }
      .top-menu nav {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        gap: 2rem;
        align-items: center;
      }
      .top-menu a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .top-menu a:hover {
        background: #333;
      }
      .top-menu .logo {
        font-size: 1.2rem;
        font-weight: 700;
        color: #4a9eff;
      }
      .content-wrapper {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 2rem;
      }
      .map-container {
        margin: 2rem 0;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
      }
      .map-header {
        padding: 1.5rem;
        background: #f8f9fa;
        border-bottom: 1px solid #dee2e6;
      }
      .map-header h2 {
        margin: 0 0 0.5rem 0;
        color: #1a1a1a;
        font-size: 1.5rem;
      }
      .map-header p {
        margin: 0;
        color: #6c757d;
        font-size: 0.95rem;
      }
      #map {
        height: 600px;
        width: 100%;
      }
      .fishing-popup h3 {
        margin: 0 0 0.5rem 0;
        color: #1a1a1a;
      }
      .fishing-popup ul {
        margin: 0.5rem 0 0 0;
        padding-left: 1.2rem;
      }
      .fishing-popup li {
        margin: 0.3rem 0;
      }
      .leaflet-control-layers {
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="top-menu">
      <nav>
        <a href="index.html" class="logo">Whitegate Observatory</a>
        <a href="combined.html">Conditions</a>
        <a href="radio.html">Radio</a>
        <a href="radio-astronomy.html">Radio Astronomy</a>
        <a href="astro-photography.html">Astro Photography</a>
        <a href="tinygs.html">TinyGS</a>
      </nav>
    </div>

    <div class="content-wrapper">
      <div class="map-container">
        <div class="map-header">
          <h2>Observatory Location</h2>
          <p>Whitegate, East Cork and Cork Harbour</p>
        </div>
        <div id="map"></div>
      </div>
    </div>

    <script>
      // Initialize the map centered on offset position for better visual layout
      const map = L.map('map').setView([51.863212, -8.120911], 11);

      // Add OpenStreetMap tiles
      const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);

      // Add a marker for Whitegate Observatory
      const marker = L.marker([51.825256, -8.240009]).addTo(map);
      marker.bindPopup('<b>Whitegate Observatory</b><br>East Cork, Ireland');

      // Add a circle to highlight the observatory area
      const circle = L.circle([51.825256, -8.240009], {
        color: '#4a9eff',
        fillColor: '#4a9eff',
        fillOpacity: 0.2,
        radius: 100
      }).addTo(map);

      // Create fishing spots layer
      const fishingLayer = L.layerGroup();

      // Create custom fishing icon (using emoji in divIcon)
      const fishingIcon = L.divIcon({
        html: '🎣',
        className: 'fishing-marker',
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -15]
      });

      // Fetch tide data
      let tideData = null;
      fetch('fishing/fishing.json')
        .then(response => response.json())
        .then(data => {
          tideData = data;
        })
        .catch(error => console.log('Tide data not available'));

      // Fetch and display fishing spots
      fetch('assets/data/fishing-spots.json')
        .then(response => response.json())
        .then(data => {
          data.spots.forEach(spot => {
            // Create popup content
            let catchList = '';
            if (spot.catches && spot.catches.length > 0) {
              catchList = '<ul>';
              spot.catches.forEach(species => {
                catchList += `<li>${species}</li>`;
              });
              catchList += '</ul>';
            } else {
              catchList = '<p><em>No catches recorded yet</em></p>';
            }
            
            // Get today's tide info if available
            let tideInfo = '';
            if (tideData && tideData.days && tideData.days.length > 0) {
              const today = tideData.days[0];
              if (today.high_tide || today.low_tide) {
                tideInfo = '<div style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #ddd;">';
                tideInfo += '<strong>Today\'s Tides:</strong><br>';
                if (today.high_tide) tideInfo += `High: ${today.high_tide}<br>`;
                if (today.low_tide) tideInfo += `Low: ${today.low_tide}`;
                tideInfo += '</div>';
              }
            }

            const seasonsInfo = spot.seasons ? `<div style="margin-top: 0.5rem;"><strong>Best Seasons:</strong> ${spot.seasons}</div>` : '';
            
            const popupContent = `
              <div class="fishing-popup">
                <h3>🎣 ${spot.name}</h3>
                ${catchList}
                ${seasonsInfo}
                ${tideInfo}
              </div>
            `;

            // Add marker to fishing layer
            const fishMarker = L.marker([spot.lat, spot.lon], { icon: fishingIcon })
              .bindPopup(popupContent);
            fishingLayer.addLayer(fishMarker);
          });
        })
        .catch(error => console.error('Error loading fishing spots:', error));

      // Add layer control
      const overlays = {
        "🎣 Fishing Spots": fishingLayer
      };

      L.control.layers(null, overlays, { collapsed: false }).addTo(map);
    </script>
  </body>
</html>
